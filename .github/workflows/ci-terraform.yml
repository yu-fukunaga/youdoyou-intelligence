name: CI Terraform
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
      - name: Check formatting
        run: make fmt-check

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 #v6.2.2
      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 #v0.3.1
      - name: Lint
        run: make lint

  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    strategy:
      matrix:
        project: [dev]
    env:
      TF_VAR_project_id_prefix: ci-placeholder
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
      - name: Validate
        run: make validate/${{ matrix.project }}
