name: CI Terraform
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
      - id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
      - name: Check formatting
        run: make fmt-check

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a #v6.3.0
      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 #v0.3.1
      - name: Lint
        run: make lint

  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    strategy:
      matrix:
        project: [dev]
    env:
      TF_VAR_project_id_prefix: ci-placeholder
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
      - id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
      - name: Validate
        run: make validate/${{ matrix.project }}
