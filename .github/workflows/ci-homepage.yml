name: CI Homepage
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - "homepage/**"
  pull_request:
    paths:
      - "homepage/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 #v6.3.0
        with:
          python-version: "3.x"
      - name: Install djlint
        run: pip install djlint==1.39.4
      - name: Lint
        run: cd homepage && make lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 #v3.2.1
        with:
          hugo-version: "0.163.3"
          extended: true
      - name: Build
        run: cd homepage && make build
